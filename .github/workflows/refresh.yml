name: Refresh MonsterDay (3h)

on:
  schedule:
    - cron: '23 */3 * * *'   # backup a cada 3h (minuto :23 p/ fugir do pico) — best effort
  workflow_dispatch:          # gatilho confiável = cron-job.org faz POST aqui

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: monsterday-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build data.js (leads x queries + leadscore)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode all
      - name: Commit data.js se mudou
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if (git status --porcelain data.js) {
            git commit -m ("auto: cloud " + (Get-Date -Format 'yyyy-MM-dd HH:mm'))
            git pull --rebase origin main
            git push
          } else { Write-Host "sem mudancas" }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Monta _site (só arquivos públicos — sem CSV/PII)
        run: |
          mkdir -p _site
          cp index.html app.js styles.css data.js .nojekyll _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
